user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=10s ipv6=off;

    server_tokens off;
    client_max_body_size 20M;

    upstream bot_backend {
        zone bot_backend 64k;
        server bot:8090 resolve;
        keepalive 8;
    }

    # HTTP webhook — Telegram accepts http:// on port 80 (no SSL required)
    server {
        listen 80;
        server_name bot.nexoranode.xyz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /webhook {
            proxy_pass http://bot_backend/webhook;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        location /health {
            proxy_pass http://bot_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location /internal/node-sync/ {
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
            proxy_connect_timeout 5s;
            access_log off;
        }

        location / {
            return 404;
        }
    }
}
