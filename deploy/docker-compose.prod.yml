services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexoranode-bot:latest
    container_name: nexoranode-bot
    env_file: ../.env
    stop_signal: SIGINT
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        poetry run alembic -c /app/db/alembic.ini upgrade head &&
        poetry run python /app/__main__.py
      "
    volumes:
      # Same file the admin panel writes — must stay in sync with panel PLANS_DIR_HOST
      - ../app/data/plans.json:/app/data/plans.json:rw
    networks:
      nexora_net:
        aliases:
          - bot
          - nexoranode-bot
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: nexoranode-postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexorabot}
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in /opt/nexoranode-bot/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexora_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: nexoranode-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nexora_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: nexoranode-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.http.conf:/etc/nginx/templates/nginx.http.conf:ro
      - ./nginx/nginx.https.conf:/etc/nginx/templates/nginx.https.conf:ro
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      - bot
    networks:
      - nexora_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  certbot_www:

networks:
  nexora_net:
    external: true
    name: ${DOCKER_NETWORK:-nexora_net}
