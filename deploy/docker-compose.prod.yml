services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexoranode-bot:latest
    container_name: nexoranode-bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: ../.env
    environment:
      PLANS_FILE: /app/data/plans.json
    stop_signal: SIGINT
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        poetry run alembic -c /app/db/alembic.ini upgrade head &&
        poetry run python /app/__main__.py
      "
    volumes:
      # Live data (plans, maintenance, receipts) — set BOT_DATA_HOST=/opt/nexoranode-data in .env
      - ${BOT_DATA_HOST:-../app/data}:/app/data:rw
      # SSH keys for direct-node xray sync (Germany → PL/SG nodes)
      - ${NODE_SSH_DIR:-/root/.ssh}:/root/.ssh:ro
    networks:
      nexora_net:
        aliases:
          - bot
          - nexoranode-bot
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3); exit(0 if r.status==200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  repair-bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexoranode-bot:latest
    container_name: nexoranode-repair-bot
    env_file: ../.env
    environment:
      REPAIR_PORT: "8091"
      MAIN_BOT_WEBHOOK_URL: "http://bot:8090/webhook"
    stop_signal: SIGINT
    restart: unless-stopped
    command: poetry run python /app/repair/__main__.py
    volumes:
      - ${BOT_DATA_HOST:-../app/data}:/app/data:ro
    networks:
      nexora_net:
        aliases:
          - repair-bot
          - nexoranode-repair-bot
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=3); exit(0 if r.status==200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: nexoranode-postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexorabot}
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in /opt/nexoranode-bot/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexora_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nexora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: nexoranode-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nexora_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: nexoranode-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.http.conf:/etc/nginx/templates/nginx.http.conf:ro
      - ./nginx/nginx.https.conf:/etc/nginx/templates/nginx.https.conf:ro
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      bot:
        condition: service_healthy
      repair-bot:
        condition: service_healthy
    networks:
      - nexora_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  nexora_net:
    external: true
    name: ${DOCKER_NETWORK:-nexora_net}
